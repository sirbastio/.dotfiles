# === Settings ===
set -g default-terminal "tmux-256color" # enable 256 colors
set -g mouse on                         # mouse support

# --- Start windows and panes at index 1 (not 0) ---
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# === Key Binds ===

# --- Open panes in current directory ---
bind '"' split-window -v -c "#{pane_current_path}"  # split vertical
bind % split-window -h -c "#{pane_current_path}"    # split horizontal

# --- Prefix ---
unbind C-b 
set -g prefix C-Space
bind C-Space send-prefix

#  === Plugins ===
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
#set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'

#  === THEME ===
set-option -g status-position top # bar at top
set -g status-style bg=default
set -g status-left-length 40
set -g status-left "#[fg=green]Session: #S #[fg=yellow]• " # Session name
set -g status-right "#[fg=cyan]%H:%M #[fg=magenta]%d-%b-%y" # Time and date

# === Scripts ===
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

run "~/.config/tmux/plugins/tpm/tpm"
